<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a0a25">
<title>Base Arcade — High Scores</title>

<meta property="og:title" content="Base Arcade — High Scores">
<meta property="og:description" content="Live high score board from Base Arcade.">
<meta property="og:image" content="https://basearcade.com/og.png">
<meta property="og:url" content="https://basearcade.com/scores">

<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #14081e;
  --bg-2: #1f0d2e;
  --panel: #2a1340;
  --ink: #f4ecff;
  --ink-dim: #b8a8d4;
  --red: #ff2a3c;
  --yellow: #ffd400;
  --cyan: #29ffe6;
  --green: #6dff7a;
  --polaroid: #fafafa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Silkscreen', 'Courier New', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background:
    radial-gradient(ellipse at top, #2a1340 0%, var(--bg) 60%),
    var(--bg);
  background-attachment: fixed;
}

/* Subtle CRT scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 999;
  mix-blend-mode: overlay;
}

a { color: inherit; text-decoration: none; }

/* ---------- Header ---------- */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5rem 2rem;
  border-bottom: 2px solid var(--panel);
  flex-wrap: wrap;
  gap: 1rem;
}

.brand {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.brand .title {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--yellow);
  text-shadow: 0 0 8px rgba(255,212,0,0.4);
}

.brand .sub {
  font-family: 'VT323', monospace;
  font-size: 1.1rem;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
}

.controls { display: flex; gap: 0.6rem; align-items: center; }

.btn {
  font-family: 'Silkscreen', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.55rem 0.9rem;
  background: var(--red);
  color: #fff;
  border: none;
  border-bottom: 4px inset rgba(0,0,0,.5);
  border-left: 4px inset rgba(0,0,0,.4);
  border-right: 4px inset rgba(255,255,255,.4);
  border-top: 4px inset rgba(255,255,255,.5);
  cursor: pointer;
  transition: filter 0.1s ease;
}

.btn:hover { filter: brightness(1.1); }
.btn:active { filter: brightness(0.85); }

.btn.ghost {
  background: var(--panel);
  color: var(--ink);
}

.status {
  font-family: 'VT323', monospace;
  font-size: 1rem;
  color: var(--green);
  letter-spacing: 0.05em;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}

.status .dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ---------- Main grid (overview) ---------- */
main { padding: 2rem; max-width: 1800px; margin: 0 auto; }

.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--ink-dim);
  font-family: 'VT323', monospace;
  font-size: 1.4rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.tile {
  background: var(--panel);
  border: 3px solid var(--bg-2);
  border-top-color: #4a2670;
  border-left-color: #4a2670;
  border-right-color: #1a0828;
  border-bottom-color: #1a0828;
  padding: 1.25rem;
  cursor: pointer;
  position: relative;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  overflow: hidden;
}

.tile:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 0 24px rgba(255,212,0,0.15);
}

.tile-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.8rem;
}

.tile-game {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(41,255,230,0.35);
}

.tile-count {
  font-family: 'VT323', monospace;
  font-size: 0.95rem;
  color: var(--ink-dim);
}

.tile-body {
  display: flex;
  align-items: flex-end;
  gap: 1rem;
  min-height: 110px;
}

.tile-score-block { flex: 1; min-width: 0; }

.tile-score {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 2.4rem;
  color: var(--yellow);
  letter-spacing: 0.02em;
  text-shadow: 0 0 12px rgba(255,212,0,0.4);
  line-height: 1;
  word-break: break-word;
}

.tile-tag {
  font-family: 'Silkscreen', monospace;
  font-size: 0.85rem;
  color: var(--ink);
  margin-top: 0.5rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.tile-empty {
  font-family: 'VT323', monospace;
  font-size: 1.1rem;
  color: var(--ink-dim);
  letter-spacing: 0.05em;
  font-style: italic;
}

/* ---------- Polaroid ---------- */
.polaroid {
  background: var(--polaroid);
  padding: 0.5rem 0.5rem 1.5rem 0.5rem;
  box-shadow: 0 6px 12px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
  display: inline-block;
  font-family: 'Permanent Marker', 'Caveat', cursive;
  text-align: center;
  flex-shrink: 0;
}

.polaroid img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #222;
}

.polaroid-caption {
  font-family: 'Silkscreen', monospace;
  color: #1a0828;
  font-size: 0.7rem;
  margin-top: 0.4rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Tile polaroid: small, slightly tilted */
.tile .polaroid {
  width: 92px;
  transform: rotate(-3deg);
}
.tile .polaroid img { aspect-ratio: 1 / 1; }

/* ---------- Detail view ---------- */
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 2rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.detail-title {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: clamp(1.8rem, 5vw, 3.5rem);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--yellow);
  text-shadow: 0 0 16px rgba(255,212,0,0.4);
  line-height: 1;
}

.detail-sub {
  font-family: 'VT323', monospace;
  font-size: 1.2rem;
  color: var(--ink-dim);
  margin-top: 0.4rem;
  letter-spacing: 0.05em;
}

/* Featured #1 polaroid */
.featured {
  display: flex;
  align-items: center;
  gap: 2rem;
  margin-bottom: 3rem;
  padding: 2rem;
  background: linear-gradient(135deg, rgba(255,212,0,0.08), rgba(255,42,60,0.06));
  border: 2px dashed var(--yellow);
  flex-wrap: wrap;
}

.featured .polaroid {
  width: 220px;
  transform: rotate(-4deg);
}
.featured .polaroid img { aspect-ratio: 1 / 1; }

.featured-info { flex: 1; min-width: 220px; }

.featured-rank {
  font-family: 'Silkscreen', monospace;
  font-size: 0.9rem;
  color: var(--red);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.featured-score {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: clamp(3rem, 9vw, 6rem);
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(255,212,0,0.5);
  line-height: 1;
  word-break: break-word;
}

.featured-tag {
  font-family: 'Silkscreen', monospace;
  font-size: 1.2rem;
  color: var(--ink);
  margin-top: 0.6rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.featured-date {
  font-family: 'VT323', monospace;
  font-size: 1.1rem;
  color: var(--ink-dim);
  margin-top: 0.3rem;
  letter-spacing: 0.05em;
}

/* Leaderboard list */
.leaderboard {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.row {
  display: grid;
  grid-template-columns: 70px 1fr auto auto;
  gap: 1.2rem;
  align-items: center;
  padding: 0.9rem 1.2rem;
  background: var(--panel);
  border-left: 4px solid var(--cyan);
}

.row.gold { border-left-color: var(--yellow); }
.row.silver { border-left-color: #cfcfcf; }
.row.bronze { border-left-color: #cd7f32; }

.row-rank {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--ink-dim);
  letter-spacing: 0.05em;
}

.row.gold .row-rank { color: var(--yellow); }
.row.silver .row-rank { color: #e0e0e0; }
.row.bronze .row-rank { color: #d28a3a; }

.row-tag {
  font-family: 'Silkscreen', monospace;
  font-size: 1rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.row-score {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--yellow);
  letter-spacing: 0.02em;
  text-align: right;
}

.row-date {
  font-family: 'VT323', monospace;
  font-size: 1rem;
  color: var(--ink-dim);
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.row-thumb {
  width: 50px;
  height: 50px;
  background: var(--bg);
  border: 2px solid var(--polaroid);
  object-fit: cover;
  flex-shrink: 0;
}

/* Polaroid wall (history with photos) */
.polaroid-wall {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 2rem 1rem;
  padding: 2rem 0;
}

.polaroid-wall .polaroid {
  width: 100%;
  max-width: 200px;
  margin: 0 auto;
}

.polaroid-wall .polaroid img { aspect-ratio: 1 / 1; }

.polaroid-wall .polaroid:nth-child(3n+1) { transform: rotate(-2deg); }
.polaroid-wall .polaroid:nth-child(3n+2) { transform: rotate(2deg); }
.polaroid-wall .polaroid:nth-child(3n+3) { transform: rotate(-1deg); }

.polaroid-wall .pw-score {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--red);
  margin-top: 0.4rem;
}

.polaroid-wall .pw-tag {
  font-family: 'Silkscreen', monospace;
  font-size: 0.7rem;
  color: #1a0828;
  margin-top: 0.2rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Loading / error states */
.loader {
  font-family: 'VT323', monospace;
  font-size: 1.4rem;
  color: var(--cyan);
  text-align: center;
  padding: 4rem 2rem;
  letter-spacing: 0.1em;
}

.loader::after {
  content: '_';
  animation: blink 0.8s steps(2) infinite;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

.error {
  background: var(--red);
  color: white;
  padding: 1rem 1.5rem;
  font-family: 'VT323', monospace;
  font-size: 1.1rem;
  letter-spacing: 0.05em;
  margin-bottom: 1.5rem;
}

footer {
  border-top: 2px solid var(--panel);
  padding: 1.5rem 2rem;
  text-align: center;
  font-family: 'VT323', monospace;
  font-size: 1rem;
  color: var(--ink-dim);
  letter-spacing: 0.05em;
}

footer a { color: var(--cyan); }

/* Fullscreen mode */
:fullscreen header { padding: 1rem 2rem; }
:fullscreen main { padding: 1.5rem 2rem; }
:fullscreen footer { display: none; }

/* TV / large display tuning */
@media (min-width: 1600px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
  .tile-score { font-size: 3rem; }
  .tile-game { font-size: 1.15rem; }
}

/* Mobile */
@media (max-width: 600px) {
  header { padding: 1rem; }
  main { padding: 1rem; }
  .grid { grid-template-columns: 1fr; gap: 1rem; }
  .row { grid-template-columns: 50px 1fr auto; gap: 0.8rem; padding: 0.7rem 0.9rem; }
  .row-date { display: none; }
  .row-thumb { width: 38px; height: 38px; }
  .featured { padding: 1.2rem; gap: 1rem; }
  .featured .polaroid { width: 160px; }
  .btn { font-size: 0.6rem; padding: 0.45rem 0.7rem; }
  .brand .sub { display: none; }
  #fullscreen-btn { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="title">⬢ Base Arcade</span>
    <span class="sub">/ High Scores</span>
  </div>
  <div class="controls">
    <span class="status" id="status"><span class="dot"></span>LIVE</span>
    <button class="btn ghost" id="refresh-btn" title="Refresh now">↻ Refresh</button>
    <button class="btn" id="fullscreen-btn" title="Fullscreen (F)">⛶ Fullscreen</button>
  </div>
</header>

<main id="app">
  <div class="loader">Loading high scores</div>
</main>

<footer>
  <p>basearcade.com / live scoreboard / press <strong>F</strong> for fullscreen, <strong>ESC</strong> to go back</p>
</footer>

<script>
(() => {
  const AIRTABLE_BASE = 'appLGFNtTxb5Z2vsQ';
  const AIRTABLE_TABLE = 'tblhMO6zblR5XesuD';
  const AIRTABLE_TOKEN = 'patqbcpAliA4VAXCR.14303e9d48e1fef45fa20544e63f91f6ca9e602b5d2cb4abb53dd7f5e598d458';
  const POLL_INTERVAL_MS = 30_000;

  const app = document.getElementById('app');
  const statusEl = document.getElementById('status');
  const refreshBtn = document.getElementById('refresh-btn');
  const fullscreenBtn = document.getElementById('fullscreen-btn');

  let allRecords = [];
  let lastFetch = 0;
  let pollTimer = null;

  // ---------- Data ----------
  async function fetchAll() {
    const records = [];
    let offset = null;
    do {
      const url = new URL(`https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}`);
      url.searchParams.set('pageSize', '100');
      if (offset) url.searchParams.set('offset', offset);
      const res = await fetch(url, {
        headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
      });
      if (!res.ok) throw new Error(`Airtable ${res.status}: ${await res.text()}`);
      const data = await res.json();
      records.push(...data.records);
      offset = data.offset;
    } while (offset);
    return records;
  }

  function normalize(records) {
    return records
      .map(r => {
        const f = r.fields || {};
        const game = (f.Game || '').trim();
        const score = typeof f.Score === 'number' ? f.Score : Number(f.Score);
        if (!game || !Number.isFinite(score)) return null;
        const photos = Array.isArray(f.Photo) ? f.Photo : [];
        const photo = photos[0] || null;
        return {
          id: r.id,
          game,
          score,
          tag: (f.Tag || '').trim(),
          photo,
          date: f.Date || r.createdTime
        };
      })
      .filter(Boolean);
  }

  function groupByGame(scores) {
    const map = new Map();
    for (const s of scores) {
      if (!map.has(s.game)) map.set(s.game, []);
      map.get(s.game).push(s);
    }
    for (const arr of map.values()) {
      arr.sort((a, b) => b.score - a.score || new Date(a.date) - new Date(b.date));
    }
    // Order games: most-played first; ties by name
    return Array.from(map.entries())
      .sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
  }

  // ---------- Helpers ----------
  function slugify(s) {
    return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function formatScore(n) {
    return n.toLocaleString('en-US');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function photoUrl(photo, size) {
    if (!photo) return null;
    if (size && photo.thumbnails && photo.thumbnails[size]) return photo.thumbnails[size].url;
    return photo.url;
  }

  // ---------- Rendering ----------
  function renderOverview(grouped) {
    if (grouped.length === 0) {
      app.innerHTML = `
        <div class="empty-state">
          <p style="font-size:1.6rem;color:var(--yellow);margin-bottom:1rem;">No scores yet.</p>
          <p>Play a game. Take a polaroid. Submit it.</p>
        </div>`;
      return;
    }

    const tiles = grouped.map(([game, scores]) => {
      const top = scores[0];
      const slug = slugify(game);
      const photo = photoUrl(top.photo, 'large');
      return `
        <a class="tile" href="#${slug}" data-game="${escapeHtml(game)}">
          <div class="tile-head">
            <span class="tile-game">${escapeHtml(game)}</span>
            <span class="tile-count">${scores.length} ${scores.length === 1 ? 'score' : 'scores'}</span>
          </div>
          <div class="tile-body">
            <div class="tile-score-block">
              <div class="tile-score">${formatScore(top.score)}</div>
              <div class="tile-tag">${escapeHtml(top.tag) || '<span class="tile-empty">—</span>'}</div>
            </div>
            ${photo ? `
              <div class="polaroid">
                <img src="${photo}" alt="${escapeHtml(top.tag)} on ${escapeHtml(game)}" loading="lazy">
                <div class="polaroid-caption">${escapeHtml(top.tag) || '—'}</div>
              </div>
            ` : ''}
          </div>
        </a>
      `;
    }).join('');

    app.innerHTML = `<div class="grid">${tiles}</div>`;
  }

  function renderDetail(game, scores) {
    if (!scores || scores.length === 0) {
      app.innerHTML = `
        <div style="margin-bottom:2rem;"><a href="#" class="btn ghost">← Back to all games</a></div>
        <h1 class="detail-title">${escapeHtml(game)}</h1>
        <div class="empty-state"><p>No scores logged yet for this game.</p></div>
      `;
      return;
    }

    const top = scores[0];
    const topPhoto = photoUrl(top.photo, 'large');

    const photoEntries = scores.filter(s => s.photo);
    const hasPolaroidWall = photoEntries.length > 0;

    const rows = scores.map((s, i) => {
      const rank = i + 1;
      const cls = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
      const thumb = photoUrl(s.photo, 'small');
      return `
        <div class="row ${cls}">
          <span class="row-rank">#${rank}</span>
          <span class="row-tag">
            ${thumb ? `<img class="row-thumb" src="${thumb}" alt="" style="display:inline-block;vertical-align:middle;margin-right:0.6rem;">` : ''}
            ${escapeHtml(s.tag) || '—'}
          </span>
          <span class="row-score">${formatScore(s.score)}</span>
          <span class="row-date">${formatDate(s.date)}</span>
        </div>
      `;
    }).join('');

    const wall = hasPolaroidWall ? `
      <h3 style="font-family:'Silkscreen',monospace;font-size:1rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cyan);margin:2rem 0 0.5rem;">Polaroid wall</h3>
      <div class="polaroid-wall">
        ${photoEntries.map(s => `
          <div class="polaroid">
            <img src="${photoUrl(s.photo, 'large')}" alt="${escapeHtml(s.tag)} on ${escapeHtml(game)}" loading="lazy">
            <div class="pw-score">${formatScore(s.score)}</div>
            <div class="pw-tag">${escapeHtml(s.tag) || '—'} · ${formatDate(s.date)}</div>
          </div>
        `).join('')}
      </div>
    ` : '';

    app.innerHTML = `
      <div style="margin-bottom:1.5rem;"><a href="#" class="btn ghost">← Back to all games</a></div>

      <div class="detail-header">
        <div>
          <h1 class="detail-title">${escapeHtml(game)}</h1>
          <p class="detail-sub">${scores.length} ${scores.length === 1 ? 'score' : 'scores'} on the board</p>
        </div>
      </div>

      <div class="featured">
        ${topPhoto ? `
          <div class="polaroid">
            <img src="${topPhoto}" alt="${escapeHtml(top.tag)} on ${escapeHtml(game)}">
            <div class="polaroid-caption">${escapeHtml(top.tag) || '—'}</div>
          </div>
        ` : ''}
        <div class="featured-info">
          <div class="featured-rank">★ Current Champion</div>
          <div class="featured-score">${formatScore(top.score)}</div>
          <div class="featured-tag">${escapeHtml(top.tag) || '—'}</div>
          <div class="featured-date">${formatDate(top.date)}</div>
        </div>
      </div>

      <h3 style="font-family:'Silkscreen',monospace;font-size:1rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:0.8rem;">Leaderboard</h3>
      <div class="leaderboard">${rows}</div>

      ${wall}
    `;
  }

  function setStatus(text, kind) {
    const colors = { live: 'var(--green)', loading: 'var(--cyan)', error: 'var(--red)' };
    statusEl.innerHTML = `<span class="dot" style="background:${colors[kind]};box-shadow:0 0 8px ${colors[kind]};"></span>${text}`;
    statusEl.style.color = colors[kind];
  }

  // ---------- Routing ----------
  function route() {
    const hash = decodeURIComponent(location.hash.replace(/^#/, ''));
    const grouped = groupByGame(normalize(allRecords));

    if (!hash) {
      renderOverview(grouped);
      return;
    }

    const match = grouped.find(([g]) => slugify(g) === hash);
    if (match) {
      renderDetail(match[0], match[1]);
    } else {
      renderOverview(grouped);
    }
    window.scrollTo(0, 0);
  }

  // ---------- Polling ----------
  async function load(showLoader = false) {
    if (showLoader && allRecords.length === 0) {
      app.innerHTML = '<div class="loader">Loading high scores</div>';
    }
    setStatus('SYNCING', 'loading');
    try {
      allRecords = await fetchAll();
      lastFetch = Date.now();
      setStatus('LIVE', 'live');
      route();
    } catch (err) {
      console.error(err);
      setStatus('OFFLINE', 'error');
      if (allRecords.length === 0) {
        app.innerHTML = `<div class="error">Couldn't load scores. ${escapeHtml(err.message)}</div>`;
      }
    }
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => load(false), POLL_INTERVAL_MS);
  }

  // ---------- Fullscreen ----------
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  }

  // ---------- Wire-up ----------
  window.addEventListener('hashchange', route);
  refreshBtn.addEventListener('click', () => load(false));
  fullscreenBtn.addEventListener('click', toggleFullscreen);

  document.addEventListener('keydown', (e) => {
    if (e.target.matches('input, textarea')) return;
    if (e.key === 'f' || e.key === 'F') {
      toggleFullscreen();
    } else if (e.key === 'Escape' && location.hash) {
      e.preventDefault();
      location.hash = '';
    } else if (e.key === 'r' || e.key === 'R') {
      load(false);
    }
  });

  // Re-fetch when tab becomes visible again
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && Date.now() - lastFetch > POLL_INTERVAL_MS) {
      load(false);
    }
  });

  load(true);
  startPolling();
})();
</script>
</body>
</html>
